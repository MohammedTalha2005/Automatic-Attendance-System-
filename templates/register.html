{% extends "base.html" %}

{% block title %}Register - Attendance System{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 2rem auto;">
    <div class="card">
        <div class="text-center mb-3">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Create Account</h1>
            <p style="color: var(--text-secondary);">Register as a new user</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" id="first_name" name="first_name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" id="last_name" name="last_name" class="form-control" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="contact" class="form-label">Contact Number</label>
                    <input type="tel" id="contact" name="contact" class="form-control">
                </div>
            </div>

            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label for="security_question" class="form-label">Security Question</label>
                <select id="security_question" name="security_question" class="form-control" required>
                    <option value="">Select a question</option>
                    <option value="Your First Pet Name">Your First Pet Name</option>
                    <option value="Your Birth Place">Your Birth Place</option>
                    <option value="Your Best Friend Name">Your Best Friend Name</option>
                </select>
            </div>

            <div class="form-group">
                <label for="security_answer" class="form-label">Security Answer</label>
                <input type="text" id="security_answer" name="security_answer" class="form-control" required>
            </div>

            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" name="terms" required>
                    <span style="color: var(--text-secondary);">I agree to the Terms & Conditions</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Register
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
            <p style="color: var(--text-secondary);">
                Already have an account?
                <a href="{{ url_for('auth.login') }}"
                    style="color: var(--primary-light); text-decoration: none;">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
