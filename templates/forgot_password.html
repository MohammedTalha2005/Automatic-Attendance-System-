{% extends "base.html" %}

{% block title %}Forgot Password - Attendance System{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="card">
        <div class="text-center mb-3">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Reset Password</h1>
            <p style="color: var(--text-secondary);">Enter your email and security answer</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="security_answer" class="form-label">Security Answer</label>
                <input type="text" id="security_answer" name="security_answer" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="new_password" class="form-label">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Reset Password
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="{{ url_for('auth.login') }}" style="color: var(--primary-light); text-decoration: none;">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
